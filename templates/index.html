<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Designer AI</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 500px; 
            width: 100%; 
        }
        h1 { color: #333; margin-bottom: 10px; }
        .team-tag { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        .output-screen { 
            width: 224px; 
            height: 224px; 
            border: 2px dashed #5c67f2; 
            margin: 20px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #fafafa; 
            border-radius: 10px; 
            overflow: hidden; 
            position: relative;
        }
        
        /* Ensures the 28x28 generation looks crisp or smooth depending on preference */
        #generated-image { 
            width: 100%; 
            height: 100%; 
            display: none; 
            image-rendering: auto; /* Change to 'pixelated' for raw look */
        }
        
        select, button { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #ddd; 
            font-size: 16px; 
        }
        
        button { 
            background: #5c67f2; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s, transform 0.1s; 
        }
        
        button:hover { background: #4a54e1; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #5c67f2; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            display: none; 
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fashion Designer AI</h1>
        <p class="team-tag">Team 31: Conditional VAE-GAN Generator</p>
        
        <div class="output-screen" id="screen">
            <div class="loader" id="loader"></div>
            <img id="generated-image" src="" alt="Generated Design">
            <span id="placeholder">Select a category and click generate</span>
        </div>

        <label for="category"><strong>Design Category:</strong></label>
        <select id="category">
            <option value="0">T-shirt/top</option>
            <option value="1">Trouser</option>
            <option value="2">Pullover</option>
            <option value="3">Dress</option>
            <option value="4">Coat</option>
            <option value="5">Sandal</option>
            <option value="6">Shirt</option>
            <option value="7">Sneaker</option>
            <option value="8">Bag</option>
            <option value="9">Ankle Boot</option>
        </select>

        <button id="gen-btn" onclick="generateImage()">Generate New Design</button>
    </div>

    <script>
        async function generateImage() {
            const screenText = document.getElementById('placeholder');
            const loader = document.getElementById('loader');
            const img = document.getElementById('generated-image');
            const btn = document.getElementById('gen-btn');
            const category = document.getElementById('category').value;
    
            // UI State: Loading
            loader.style.display = 'block';
            screenText.style.display = 'none';
            img.style.display = 'none';
            btn.disabled = true;

            try {
                const response = await fetch('/generate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: category }) 
                });
                
                const data = await response.json();
        
                if (data.image) {
                    img.src = 'data:image/png;base64,' + data.image;
                    img.style.display = 'block';
                    loader.style.display = 'none';
                } else {
                    throw new Error("No image data received");
                }
            } catch (error) {
                console.error("Error:", error);
                alert('Generation failed. Ensure the server is running and a checkpoint exists.');
                loader.style.display = 'none';
                screenText.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
